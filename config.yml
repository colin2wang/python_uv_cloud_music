# Configuration file for Music Library Organizer

# API Configuration
api:
#  base_url: "https://musicapi.lxchen.cn"
  base_url: "https://dm.jfjt.cc/"

# Download Configuration
download:
  # Default download directory
  default_dir: "downloads"

  # Default audio quality (standard, exhigh, lossless, hires, sky, jyeffect, jymaster)
  #  standard - Standard quality
  #  exhigh - High quality
  #  lossless - Lossless quality (default)
  #  hires - Hi-Res quality
  #  sky - Immersive surround sound
  #  jyeffect - HD surround sound
  #  jymaster - Ultra-clear master
  default_quality: "lossless"

  # Whether to add track index to filename
  add_index_to_filename: true

  # Index format (3 digits: 001, 002, ...)
  index_format: "03d"

# Filename Configuration
filename:
  # Filename pattern: {index} - {artist} - {title}
  # Available variables: index, artist, title, album
  pattern: "{index} - {artist} - {title}"

  # Replacement for illegal characters
  illegal_char_replacement: "_"

  # Replacement for artist delimiters
  artist_delimiter_replacement: ", "

# Metadata Configuration
metadata:
  # Whether to write metadata to files
  write_metadata: true

  # Whether to embed cover images
  write_cover: true

  # Whether to write lyrics
  write_lyrics: true

  # Maximum lyric length
  max_lyric_length: 1000

# Network Configuration
network:
  # Request timeout in seconds
  timeout: 30

  # Maximum random delay between requests in seconds
  random_delay_max: 2.5

  # Minimum delay between API calls in seconds
  api_delay_min: 1.0

  # Number of retries for failed requests (default: 1)
  max_retries: 1

# Logging Configuration
logging:
  # Log level (DEBUG, INFO, WARNING, ERROR, CRITICAL)
  level: "INFO"

  # Log format string
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

  # Whether to output to console
  console_output: true

  # Whether to output to file
  file_output: true

  # Log file path
  log_file: "logs/app.log"
